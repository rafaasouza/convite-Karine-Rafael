<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Convite</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      background: linear-gradient(to bottom, #f8f1f3, #f4e7ea);
      font-family: "Georgia", "Times New Roman", serif;
      color: #6f4b57;
    }

    .pagina {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      position: relative;
      cursor: pointer;
    }

    .container img {
      width: 100%;
      display: block;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(111, 75, 87, 0.18);
    }

    .hidden {
      display: none;
    }

    .controle {
      margin-top: 14px;
    }

    .btn-toggle {
      border: 1px solid #d7b7c1;
      background: rgba(255, 255, 255, 0.7);
      color: #7a5560;
      border-radius: 999px;
      padding: 8px 18px;
      font-size: 12px;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(4px);
    }

    .btn-toggle:hover {
      background: #fff;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(111, 75, 87, 0.12);
    }

    .links {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      width: 100%;
    }

    .chip {
      text-decoration: none;
    }

    .chip span {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid #e3c8d0;
      background: rgba(255, 255, 255, 0.82);
      color: #7a5560;
      font-size: 12px;
      line-height: 1;
      letter-spacing: 0.2px;
      box-shadow: 0 3px 10px rgba(111, 75, 87, 0.08);
      transition: all 0.2s ease;
    }

    .chip span:hover {
      background: #fff;
      transform: translateY(-1px);
      box-shadow: 0 5px 14px rgba(111, 75, 87, 0.14);
    }

    .mensagem {
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
      color: #8b6571;
      line-height: 1.5;
      max-width: 320px;
    }

    @media (max-width: 480px) {
      body {
        padding: 14px;
      }

      .chip span {
        font-size: 11px;
        padding: 8px 12px;
      }

      .btn-toggle {
        font-size: 11px;
        padding: 8px 16px;
      }

      .mensagem {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="pagina">
    <div class="container" onclick="abrirConvite()">
      <!-- PRIMEIRA IMAGEM: LAÇO -->
      <img id="capa" src="convite.1.jpg" alt="Clique para abrir o convite" />

      <!-- SEGUNDA IMAGEM: CONVITE -->
      <img id="convite" src="convite.2.jpg" alt="Convite" class="hidden" />
    </div>

    <div class="controle">
      <button class="btn-toggle" type="button" onclick="alternarConvite(event)">
        Abrir / Fechar
      </button>
    </div>

    <div class="links">
      <a class="chip"
         href="https://www.google.com/maps/place/Par%C3%B3quia+Santo+Ant%C3%B4nio+De+Gopo%C3%BAva+-+Diocese+de+Guarulhos+(SP)/@-23.4605121,-46.5455246,17z/data=!3m1!4b1!4m6!3m5!1s0x94cef56d180a2251:0xa183b3abe1b1610b!8m2!3d-23.4605121!4d-46.5429497!16s%2Fg%2F1ptwpjhlr?entry=ttu&g_ep=EgoyMDI2MDQwOC4wIKXMDSoASAFQAw%3D%3D"
         target="_blank" rel="noopener noreferrer">
        <span>📍 Cerimônia</span>
      </a>

      <a class="chip"
         href="https://www.google.com/maps/dir/Par%C3%B3quia+Santo+Ant%C3%B4nio+De+Gopo%C3%BAva+-+Diocese+de+Guarulhos+(SP),+Largo+Santo+Ant%C3%B4nio,+7+-+Gopouva,+Guarulhos+-+SP,+07092-051/R.+Paulo+Lenk,+161+-+Jardim+Zaira,+Guarulhos+-+SP,+07094-040/@-23.4634592,-46.5427588,16z/data=!3m1!4b1!4m14!4m13!1m5!1m1!1s0x94cef56d180a2251:0xa183b3abe1b1610b!2m2!1d-46.5429497!2d-23.4605121!1m5!1m1!1s0x94cef542fd8821a3:0x8a347d3a31e02188!2m2!1d-46.5330406!2d-23.463453!3e3?entry=ttu&g_ep=EgoyMDI2MDQwOC4wIKXMDSoASAFQAw%3D%3D"
         target="_blank" rel="noopener noreferrer">
        <span>🚗 Recepção</span>
      </a>

      <a class="chip"
         href="https://noivos.casar.com/karine-e-rafael-2026-08-15"
         target="_blank" rel="noopener noreferrer">
        <span>🎁 Presentes e presença</span>
      </a>
    </div>

    <div class="mensagem">
      Toque no laço para abrir o convite.
    </div>
  </div>

  <script>
    function abrirConvite() {
      const capa = document.getElementById("capa");
      const convite = document.getElementById("convite");

      if (!capa.classList.contains("hidden")) {
        capa.classList.add("hidden");
        convite.classList.remove("hidden");
      }
    }

    function alternarConvite(event) {
      event.stopPropagation();

      const capa = document.getElementById("capa");
      const convite = document.getElementById("convite");

      capa.classList.toggle("hidden");
      convite.classList.toggle("hidden");
    }
  </script>
</body>
</html>
